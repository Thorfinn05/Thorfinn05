name: gitartwork from a contribution graph
on: 
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'  # Don't trigger on README changes
  workflow_dispatch:  # Allow manual trigger
  
permissions:
  contents: write

jobs:
  build:
    name: Make gitartwork SVG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Pull latest changes first
        run: |
          git config user.name "Thorfinn05"
          git config user.email "rudranild04@gmail.com"
          git pull origin main
      
      - name: Generate gitartwork
        uses: jasineri/gitartwork@v1
        with:
           user_name: Thorfinn05
           text: RUDRANIL
      
      - name: Commit and push with conflict resolution
        run: |
          git config user.name "Thorfinn05"
          git config user.email "rudranild04@gmail.com"
          
          # Check if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Update gitartwork" || echo "No changes to commit"
            
            # Pull with rebase and push
            git pull --rebase origin main || {
              echo "Rebase failed, trying merge strategy"
              git rebase --abort
              git pull origin main
            }
            
            git push origin main
          else
            echo "No changes to commit"
          fi
